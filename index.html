<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meridiana — Geography Game</title>
    <meta name="description" content="A Wordle-style geography game. Guess the location of famous landmarks on a world map." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <header id="game-header">
      <h1>🌐 Meridiana</h1>
    </header>

    <main id="game-area">
      <div id="map-container"></div>

      <div id="bottom-bar">
        <span id="coordinates-display">Click the map to place a pin.</span>
        <button id="submit-guess" class="btn-primary" disabled>🎯 Submit Guess</button>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
